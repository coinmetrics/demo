      properties:
        Amount:
          description: Amount of the trade, i.e. Price times Quantity.
          type: string
        AmountCurrency:
          description: Currency in which Amount is specified.
          type: string
        CandidateBpsFromBest:
          description: Bps from best aggregate liquidity bucket price.
          type: string
        CandidateExpectedFillPrice:
          description: Expected fill price fee inclusive for this record.
          type: string
        CandidateExpectedFillQty:
          description: Expected fill quantity for this record.
          type: string
        CandidateLiquidityBucketIdx:
          description: The index of the Liquidity Bucket the market for these analytics
            belongs to. If CandidateMarketID is missing, then the index assigned to
            the liquidity bucket.
          format: int32
          type: number
        CandidateMarket:
          description: Market for this analytics. If missing these analytics are aggregate
            values for a liquidity bucket instead of an individual market.
          type: string
        CandidateMarketBestBid:
          description: Best bid on the candidate market
          type: string
        CandidateMarketBestOffer:
          description: Best offer on the candidate market
          type: string
        Currency:
          description: Currency of the Quantity of the trade.
          type: string
        DealtCurrency:
          description: Currency in which Quantity was specified.
          type: string
        Fee:
          description: Fee on the trade as reported by the exchange.
          type: string
        FeeCurrency:
          description: Fee currency, may be missing if no fees were paid.
          type: string
        Market:
          description: Market for this trade.
          type: string
        MarketOrderID:
          description: The market order id for this trade
          type: string
        MarketTradeID:
          description: TradeID as reported by the market.
          type: string
        OrderID:
          description: OrderID of the parent order.
          type: string
        Price:
          description: Price of the trade
          type: string
        PriceAllIn:
          description: Price of the trade with fees included.
          type: string
        Quantity:
          description: Quantity of the trade.
          type: string
        Side:
          $ref: '#/components/schemas/Side'
        Symbol:
          description: SecurityID of Security that was traded.
          type: string
        Timestamp:
          description: Timestamp of when the trade was received by Talos.
          format: date-time
          type: string
        TradeID:
          description: TradeID of this trade. Generated by Talos.
          type: string
        TransactTime:
          description: Timestamp of the trade as reported by the market.
          format: date-time
          type: string
      required:
      - Timestamp
      - OrderID
      - Side
      - TradeID
      - TransactTime
      - MarketTradeID
      - Price
      - PriceAllIn
      - Quantity
      - Currency
      - Amount
      - AmountCurrency
      - DealtCurrency
      - Fee
      - CandidateLiquidityBucketIdx
      title: TradeAnalyticsRequest
      type: object
