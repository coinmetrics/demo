      - FirstMappedSubAccount
      - AllMappedSubAccounts
      - LeaveUnallocated
      type: string
      x-enumDescriptions:
        AllMappedSubAccounts: Allocate evenly to all mapped subaccounts
        FirstMappedSubAccount: Routes trades to a deterministic (but arbitrary) SubAccount
          from those mapped to a MarketAccount
        LeaveUnallocated: Do not allocate matching transactions to any sub account
        OnlyMappedSubAccount: Routes trades to the only SubAccount mapped to a MarketAccount.  Does
          not route if there are multiple mappings
