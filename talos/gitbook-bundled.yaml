    MarketFeeMode:
      enum:
      - QuoteCurrency
      - ReceiveCurrency
      - MakerReceiveTakerQuote
      - PositiveReceiveNegativeOutgoing
      - UnrelatedCurrency
      - AmountCurrency
      - SpecificCurrency
      - OutgoingCurrency
      type: string
      x-enumDescriptions:
        AmountCurrency: 'Fee is charged in currency in the amount currency of the
          order. E.g: regular order => Quote, Counter Currency Order => Base'
        MakerReceiveTakerQuote: Fee is charged using ReceiveCurrency mode for maker
          orders and QuoteCurrency mode for taker orders
        OutgoingCurrency: Fee is charged in the outgoing currency e.g Buy BTC-USD
          will be charged in USD, Sell will be charged in BTC
        PositiveReceiveNegativeOutgoing: Fee is charged in the currency received for
          positive fees and outgoing currency for negative fees
        QuoteCurrency: Fee is charged in the quote currency
        ReceiveCurrency: Fee is charged in the currency received e.g Buy BTC-USD will
          be charged in BTC
        SpecificCurrency: Fee is charged in a specific currency.
        UnrelatedCurrency: 'DEPRACATED: Fee is charged in currency that''s unrelated
          to the traded symbol. E.g: always charge fees in USD regardless of traded
          symbol'
