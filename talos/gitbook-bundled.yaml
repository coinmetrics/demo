        NewOrderFailed: Action that Indicates that a Newly Submitted Hedge Order was
          Rejected
        NewOrderSubmitted: Action that Indicates a New Hedge Order Has been Submitted
          and the Hedger is Awaiting Acceptance
        OrderCancelFailed: Action that Indicates that a Submitted Hedge Order Cancelation
          was Rejected
        OrderCancelSubmitted: Action that Indicates an Order Cancelation Has been
          Submitted and the Hedger is Awaiting Acceptance
        OrderCanceled: Action Set on CancelToAgress Decision to Indicate that the
          Cancel Side is Complete
        OrderModificationFailed: Action that Indicates that a Submitted Hedge Order
          Modification was Rejected
        OrderModificationSubmitted: Action that Indicates an Order Modification Has
          been Submitted and the Hedger is Awaiting Acceptance
        RequestNewOrder: Action where the Hedger Requests a New Order with Details
        RequestOrderCancel: Action where the Hedger Requests an Order Cancelation
          with Details
        RequestOrderModification: Action where the Hedger Requests an Order Modification
          with Details
