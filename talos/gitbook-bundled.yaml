    LedgerUpdateStatus:
      enum:
      - PendingApproval
      - Completed
      - Rejected
      - Error
      type: string
      x-enumDescriptions:
        Completed: Update has been applied successfully
        Error: An error occurred while trying to apply the update
        PendingApproval: Update is pending approval
        Rejected: Failed to apply the update
    LedgerUpdateType:
      enum:
      - Balance
      - Trade
      - TradingFee
      - TradingFeeSet
      - TradingFeeAccum
      - BalanceDelta
      - TradeCancel
      - TradeAmend
      - Allocation
      - Unsettled
      - UnsettledDelta
      - FundingPnL
      - FundingPnLDelta
      - FundingPnLAccum
      - RealizedPnL
      - RealizedPnLDelta
      - RealizedPnLAccum
      - ReconAdjustment
      - Deposit
      - Withdrawal
      - TransferFee
      - Delivery
      - StakingReward
      - StakingRewardFee
      - Settlement
      - PreliminaryCreate
      - FinalCreate
      - PreliminaryRedeem
      - FinalRedeem
      - ManagementFee
      - DepositInterest
      type: string
      x-enumDescriptions:
        Allocation: 'Deprecated, do not use. Previous description: Trade allocation
          to account'
        Balance: Set the balance to a value
        BalanceDelta: 'Adjust the balance by a delta, ie: a transfer in or out of
          the account'
        Delivery: A balance delta fee from a Transfer
        Deposit: A balance delta from Deposit
        DepositInterest: Interest paid or charged for cash held in a deposit savings
          account.
        FinalCreate: Final amount for creating shares of a fund.
        FinalRedeem: Final amount for redeeming shares of a fund.
        FundingPnL: Set the FundingPnL associated with this ledger
        FundingPnLAccum: Accumulation of funding-pnl.  Only affects the FundingPnL
          field
        FundingPnLDelta: Adjust the FundingPnL associated with this ledger
        ManagementFee: Management fee charged for managing a fund.
        PreliminaryCreate: Preliminary amount for creating shares of a fund.
        PreliminaryRedeem: Preliminary amount for redeeming shares of a fund.
        RealizedPnL: Set the RealizedPnL associated with this ledger
        RealizedPnLAccum: Accumulation of realized-pnl.  Only affects the RealizedPnL
          field
        RealizedPnLDelta: Adjust the RealizedPnL associated with this ledger
        ReconAdjustment: A balance delta from Reconciliation
        Settlement: Settlement / credit reset
        StakingReward: Balance delta for rewards from staked assets
        StakingRewardFee: Balance delta for fees from staked assets
        Trade: Trade in account
        TradeAmend: Trade Amend
        TradeCancel: Trade Cancel
        TradingFee: Charge trading fee from account
        TradingFeeAccum: Accumulation of trading fee(s).  Only affects the CumFees
          field
        TradingFeeSet: Set trading fees for account
        TransferFee: A balance delta fee from a Transfer
        Unsettled: Set the Unsettled balance / position
        UnsettledDelta: Adjust the Unsettled balance / position
        Withdrawal: A balance delta from Withdrawal
    LegDirection:
      enum:
      - Same
      - Opposite
      type: string
      x-enumDescriptions:
        Opposite: Opposite direction (buy or sell) as the parent order
        Same: Same direction (buy or sell) as the parent order
    LendingRelationship:
      description: A record configuring the relationship between a lender and a borrower.
