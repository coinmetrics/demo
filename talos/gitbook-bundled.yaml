    post:
      description: 'Submit a new order. The response includes the execution report
        for the order.

        Use `timeout` and `wait-for-status` query parameters to control synchronous
        behavior.

        '
      operationId: createOrder
      parameters:
      - description: Request timeout duration (e.g., "30s", "1m"). Defaults to org
          configuration.
        in: query
        name: timeout
        required: false
        schema:
          type: string
      - description: Wait for order to reach this status before returning.
        in: query
        name: wait-for-status
        required: false
        schema:
          enum:
          - Pending
          - Acknowledged
          - Terminal
          type: string
      requestBody:
        content:
          application/json:
            schema:
              description: OMSNewOrderSingle
              example:
                ClOrdID: 6fc97a0d-4c00-412b-b4ad-d33843c71d0e
                OrdType: Limit
                OrderQty: '0.001'
                Price: '1.00'
                Side: Buy
                Symbol: BTC-USD
                TimeInForce: GoodTillCancel
              properties:
                Aggregations:
                  description: Aggregations used for this order
                  items:
                    properties:
                      Aggregation:
                        description: Unique ID of the aggregation
                        type: string
                      LegIndex:
                        description: Leg Index in Legs array
                        format: int32
                        type: number
                    type: object
                  type: array
                Allocation:
                  additionalProperties: true
                  description: optional allocation request
                  type: object
                AllowedSlippage:
                  description: Slippage for limit orders where we decide the route
                  type: string
                CancelSessionID:
                  description: SessionID for this order to be cancelled when the session
                    resets
                  type: string
                ClOrdID:
                  description: ClOrdID
                  type: string
                Comments:
                  description: Additional information attached to the order
                  format: String
                  type: string
                Currency:
                  description: Currency ID for the dealt currency
                  type: string
                EndTime:
                  description: End time when order should be completed
                  format: date-time
                  type: string
                ExpectedFillPrice:
                  description: Expected average filled price
                  type: string
                ExpectedFillQty:
                  description: Expected filled quantity in units of Currency
                  type: string
                Group:
                  description: Arbitrary string assigned when the order is submitted
                  format: String
                  type: string
                InitialDecisionStatus:
                  $ref: '#/components/schemas/DecisionStatus'
                Markets:
                  description: Number of markets to be used for this order
                  items:
                    properties:
                      LegIndex:
                        description: Index of synthetic leg if this leg is a child
                          leg
                        format: int32
                        type: number
                      Market:
                        description: Market ID
                        type: string
                      MarketAccount:
                        description: Selected MarketAccount
                        type: string
                      ParentSymbol:
                        description: Security ID of the parent security if this is
                          the synthetic leg market security
                        type: string
                      Symbol:
                        description: Security ID
                        type: string
                    type: object
                  type: array
                MultilegParams:
                  $ref: '#/components/schemas/MultilegParameters'
                OrdType:
                  $ref: '#/components/schemas/OrdType'
                OrderQty:
                  description: Order quantity
                  type: string
                Parameters:
                  additionalProperties: true
                  description: Algo parameters
                  type: object
                ParentCounterparty:
                  description: Parent Customer CounterpartyID
                  type: string
                ParentOrderID:
                  description: Parent Customer Order ID
                  type: string
                PreTradeRequestID:
                  description: PreTrade request identifier
                  format: String
                  type: string
                PreTradeSessionID:
                  description: PreTrade session identifier
                  format: String
                  type: string
                Price:
                  description: Limit price
                  type: string
                PricingMode:
                  $ref: '#/components/schemas/PricingMode'
                QuoteID:
                  description: Quote OMS ID
                  type: string
                RFQID:
                  description: Quote request ID
                  type: string
                RequestSource:
                  $ref: '#/components/schemas/RequestSource'
                SessionID:
                  description: SessionID for this order
                  type: string
                SettleDate:
                  description: The date and time desired for settlement in number
                    of nanoseconds since Unix epoch.
                  format: date-time
                  type: string
                Side:
                  $ref: '#/components/schemas/Side'
                StartTime:
                  description: Start time when order should be executed
