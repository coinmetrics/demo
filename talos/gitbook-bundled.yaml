                SubAccount:
                  description: Optional subAccountID
                  type: string
                SubmitTime:
                  description: Internal time the message was sent in number of nanoseconds
                    since Unix epoch
                  format: date-time
                  type: string
                Symbol:
                  description: Security ID
                  type: string
                TimeInForce:
                  $ref: '#/components/schemas/TimeInForce'
                Timestamp:
                  description: Internal time in number of nanoseconds since Unix epoch
                  format: date-time
                  type: string
                TransactTime:
                  description: Order entry time in number of nanoseconds since Unix
                    epoch
                  format: date-time
                  type: string
                User:
                  description: User ID
                  type: string
              title: NewOrderSingle
              type: object
        required: true
      responses:
