    MarketDataSnapshot:
      type: object
      title: MarketDataSnapshot
      description: Market data snapshot with bids, offers, and market status
      required:
      - Symbol
      - DepthType
      - LiquidityType
      - Bids
      - Offers
      - Markets
      properties:
        Symbol:
          type: string
          description: Trading symbol (e.g., "BTC-USD")
          example: BTC-USD
        DepthType:
          type: string
          description: Type of market depth calculation (e.g., "VWAP")
          example: VWAP
        LiquidityType:
          type: string
          description: Type of liquidity (e.g., "Indicative", "Firm")
          example: Indicative
        UnifiedLiquidity:
          type: string
          description: Unified liquidity feature status. Only present if enabled.
          example: Enabled
        ExchangeTime:
          type: string
          format: date-time
          description: Latest exchange message timestamp from the markets used on
            this snapshot in ISO-8601 UTC format. May be omitted depending on configuration.
          example: '2026-01-29T04:32:13.870000Z'
        SystemTime:
          type: string
          format: date-time
          description: Latest system message timestamp from the markets used on this
            snapshot in ISO-8601 UTC format. May be omitted depending on configuration.
          example: '2026-01-29T04:32:13.870776Z'
        Bids:
          type: array
          description: Array of bid entries ordered by price (highest first)
          items:
            type: object
            required:
            - Price
            - VWAP
            - Size
            properties:
              Price:
                type: string
                description: Bid price as a decimal string
                example: '88092.20000000'
              VWAP:
                type: string
                description: Volume-weighted average price for this bid level as a
                  decimal string
                example: '88092.20000000'
              BPS:
                type: string
                description: Basis points spread for this bid level as a decimal string
                example: '0.00000000'
              Size:
                type: string
                description: Total size available at this price level as a decimal
                  string
                example: '0.01048000'
              Amount:
                type: string
                description: Total amount (price * size) at this bid level as a decimal
                  string
                example: '923.45678900'
              Equivalent:
                type: object
                description: Equivalent price information in a different currency.
                  Only present if conversion is applicable.
                properties:
                  Price:
                    type: string
                    description: Equivalent bid price in the converted currency as
                      a decimal string
                    example: '88092.20000000'
                  VWAP:
                    type: string
                    description: Equivalent VWAP in the converted currency as a decimal
                      string
                    example: '88092.20000000'
                  ConversionRate:
                    type: string
                    description: Conversion rate used for the equivalent price as
                      a decimal string
                    example: '1.00000000'
                  Amount:
                    type: string
                    description: Equivalent amount in the converted currency as a
                      decimal string
                    example: '923.45678900'
        Offers:
          type: array
          description: Array of offer entries ordered by price (lowest first)
          items:
            type: object
            required:
            - Price
            - VWAP
            - Size
            properties:
              Price:
                type: string
                description: Offer price as a decimal string
                example: '88043.02000000'
              VWAP:
                type: string
                description: Volume-weighted average price for this offer level as
                  a decimal string
                example: '88043.02000000'
              BPS:
                type: string
                description: Basis points spread for this offer level as a decimal
                  string
                example: '0.00000000'
              Size:
                type: string
                description: Total size available at this price level as a decimal
                  string
                example: '0.00013000'
              Amount:
                type: string
                description: Total amount (price * size) at this offer level as a
                  decimal string
                example: '11.44559260'
              Equivalent:
                type: object
                description: Equivalent price information in a different currency.
                  Only present if conversion is applicable.
                properties:
                  Price:
                    type: string
                    description: Equivalent offer price in the converted currency
                      as a decimal string
                    example: '88043.02000000'
                  VWAP:
                    type: string
                    description: Equivalent VWAP in the converted currency as a decimal
                      string
                    example: '88043.02000000'
                  ConversionRate:
                    type: string
                    description: Conversion rate used for the equivalent price as
                      a decimal string
                    example: '1.00000000'
                  Amount:
                    type: string
                    description: Equivalent amount in the converted currency as a
                      decimal string
                    example: '11.44559260'
        Markets:
          type: object
          description: Market status information keyed by market name
          additionalProperties:
            type: object
            required:
            - Status
            properties:
              Status:
                type: string
                description: Market connection status
                enum:
                - Online
                - Stale
                - Offline
                example: Online
              Message:
                type: string
                description: Optional status message for the market connection
                example: Connection established
              ExchangeTime:
                type: string
                format: date-time
                description: Latest exchange message timestamp for this market in
                  ISO-8601 UTC format. May be omitted for stale markets or depending
                  on configuration.
                example: '2026-01-29T04:32:13.729826Z'
              SystemTime:
                type: string
                format: date-time
                description: Latest system message timestamp for this market in ISO-8601
                  UTC format. May be omitted depending on configuration.
                example: '2026-01-29T04:32:13.729826Z'
              MarketAccount:
                type: string
                description: Market account name. Only present if a specific market
                  account is associated.
                example: trading-account-1
              Symbols:
                type: array
                description: Array of security symbols associated with this market
                  entry. Used for unified liquidity scenarios.
                items:
                  type: string
                example:
                - BTC-USD
                - ETH-USD
              MarketAccounts:
                type: array
                description: Array of market account entries when multiple market
                  accounts exist for the same market
                items:
                  type: object
                  properties:
                    Status:
                      type: string
                      description: Market connection status for this market account
                      enum:
                      - Online
                      - Stale
                      - Offline
                      example: Online
                    Message:
                      type: string
                      description: Optional status message for this market account
                        connection
                    ExchangeTime:
                      type: string
                      format: date-time
                      description: Latest exchange message timestamp for this market
                        account
                    SystemTime:
                      type: string
                      format: date-time
                      description: Latest system message timestamp for this market
                        account
                    MarketAccount:
                      type: string
                      description: Market account name. Uses semantic marshalling
                        (MarketAccountID is converted to MarketAccount).
                      example: trading-account-1
                    Symbols:
                      type: array
                      description: Array of security symbols associated with this
                        market account
                      items:
                        type: string
