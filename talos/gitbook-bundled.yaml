          type: string
        PriceImprovementRatio:
          description: If price improvement happens this param indicates how much
            price improvement benefit goes to counterparty
          type: string
        PricesTimeout:
          description: Maximum time in millisecond for first price update. 0 means
            no waiting for getting all market prices
          type: string
        PricingAggregation:
          description: Aggregation id containing list of underlying markets to use
            for pricing.
          type: string
        QuoteTTL:
          description: Time to live for individual quote in millisecond
          type: string
        RFQTTL:
          description: Time to live for entire RFQ in millisecond
          type: string
        Revision:
          description: Revision of that pricing rule
          format: int32
          type: number
        SalesCommission:
          description: Sales commission to take from the trade
          type: string
        Spread:
          description: Spread applied both to bid and ask price like 0.01
          type: string
        Symbol:
          description: Security ID
          type: string
        TakeProfitInQuoteCurrency:
          description: Ensure profits are taken in the quote currency
