    CustomerMarketDataSnapshot:
      type: object
      title: CustomerMarketDataSnapshot
      description: Customer market data snapshot with bids, offers, and customer-specific
        settings
      required:
      - Timestamp
      - Symbol
      - Status
      - QuoteTTL
      - PriceImprovementRatio
      - AcceptPriceLeniency
      - MinMarketDataThrottle
      - OrderPriceImprovementRatio
      - BidSpread
      - OfferSpread
      - SizeBuckets
      - Bids
      - Offers
      - AmountBuckets
      properties:
        Timestamp:
          type: string
          format: date-time
          description: Timestamp of the snapshot in ISO-8601 UTC format
          example: '2026-01-29T17:07:59.100441Z'
        Symbol:
          type: string
          description: Trading symbol (e.g., "BTC-USD")
          example: BTC-USD
        Status:
          type: string
          description: Status of customer connection to dealer liquidity
          enum:
          - Online
          - Stale
          - Offline
          example: Online
        QuoteTTL:
          type: string
          description: Time to live for individual quote (e.g., "5s")
          example: 5s
        PriceImprovementRatio:
          type: string
          description: Price improvement benefit ratio for counterparty (decimal string)
          example: '0'
        AcceptPriceLeniency:
          type: string
          description: Price leniency when accepting previously quoted price (decimal
            string)
          example: '0'
        MinMarketDataThrottle:
          type: string
          description: Minimum supported MarketData throttle (e.g., "100ms")
          example: 100ms
        OrderPriceImprovementRatio:
          type: string
          description: Order version of PriceImprovementRatio (decimal string)
          example: '0'
        BidSpread:
          type: string
          description: Spread applied to bid price (decimal string)
          example: '0'
        OfferSpread:
          type: string
          description: Spread applied to offer price (decimal string)
          example: '0'
        SizeBuckets:
          type: array
          description: Requested price depth for market view - size buckets
          items:
            type: object
            properties:
              Bucket:
                type: string
                description: Size bucket value
                example: '1.0'
          example: []
        Bids:
          type: array
          description: Array of bid entries ordered by price (highest first)
          items:
            type: object
            required:
            - Price
            - Size
            properties:
              Price:
                type: string
                description: Bid price as a decimal string
                example: '84988.90'
              Size:
                type: string
                description: Total size available at this price level as a decimal
                  string
                example: '0.41178896'
        Offers:
          type: array
          description: Array of offer entries ordered by price (lowest first)
          items:
            type: object
            required:
            - Price
            - Size
            properties:
              Price:
                type: string
                description: Offer price as a decimal string
                example: '84978.00'
              Size:
                type: string
                description: Total size available at this price level as a decimal
                  string
                example: '0.01624417'
        AmountBuckets:
          type: array
          description: Requested price depth for market view - amount buckets
          items:
            type: object
            properties:
              Bucket:
                type: string
                description: Amount bucket value
                example: '1000.0'
          example: []
