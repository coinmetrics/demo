          description: Asset of this position entry
          type: string
        Equity:
          description: Equity at the timestamp
          type: string
        EquivalentCurrency:
          description: Currency ID for equivalence. No rates if zero
          type: string
        EquivalentPosition:
          description: Position converted to equivalent currency
          type: string
        EquivalentRate:
          description: ConversionRate in equivalent currency
          type: string
        InitialMargin:
          description: InitialMargin at the timestamp
          type: string
        LastUpdateTime:
          description: Latest time this position was updated
