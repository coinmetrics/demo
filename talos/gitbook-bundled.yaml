  /position-stats/subaccounts:
    get:
      summary: List subaccount position stats
      description: 'Retrieve position statistics for subaccounts. Can be used in two
        ways:

        1. With StartDate (and optionally EndDate) to get position stats within a
        time interval.

        2. With Date to get position stats for a specific instant (must be aligned
        to 15-minute boundary).

        Either Date or StartDate must be specified.

        '
      operationId: listSubaccountPositionStats
      tags:
      - Positions
      parameters:
      - name: Date
        in: query
        required: false
        schema:
          type: string
          format: date-time
        description: Returns one position stat per symbol/subaccount pair nearest
          to this time. Mutually exclusive with StartDate/EndDate. Must be aligned
          to a 15-minute boundary (ending in :00:00, :15:00, :30:00, or :45:00). ISO-8601
          UTC format (e.g., 2019-02-13T05:15:00.000000Z).
      - name: StartDate
        in: query
        required: false
        schema:
          type: string
          format: date-time
        description: Returns position stats with timestamp after this time. ISO-8601
          UTC format (e.g., 2019-02-13T05:17:32.000000Z).
      - name: EndDate
        in: query
        required: false
        schema:
          type: string
          format: date-time
        description: Returns position stats with timestamp before this time. Used
          with StartDate. ISO-8601 UTC format (e.g., 2019-02-13T05:17:32.000000Z).
      - name: Symbols
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Optional list of symbols/currencies to filter position updates.
          Default is all.
      - name: SubAccount
        in: query
        required: false
        schema:
          type: string
        description: Optional subaccount to filter position updates. Default is all
          if SubAccount and SubAccounts are not specified.
      - name: SubAccounts
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Optional list of subaccounts to filter position updates. Default
          is all if SubAccount and SubAccounts are not specified.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
        description: Number of records to return
      - name: after
        in: query
        required: false
        schema:
          type: string
        description: Pagination token
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionStatResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /position-stats/price-marks:
    get:
      summary: List price marks
      description: 'Retrieve price marks. Can be used in two ways:

        1. With StartDate (and optionally EndDate) to get price marks within a time
        interval.

        2. With Date to get price marks for a specific instant (must be aligned to
        15-minute boundary).

        Either Date or StartDate must be specified.

        '
      operationId: listPriceMarks
      tags:
      - Positions
      parameters:
      - name: Date
        in: query
        required: false
        schema:
          type: string
          format: date-time
        description: Returns one price mark per symbol with this specific timestamp
          if it exists. Mutually exclusive with StartDate/EndDate. Must be aligned
          to a 15-minute boundary (ending in :00:00, :15:00, :30:00, or :45:00). ISO-8601
          UTC format (e.g., 2019-02-13T05:15:00.000000Z).
      - name: StartDate
        in: query
        required: false
        schema:
          type: string
          format: date-time
        description: Returns price marks with timestamp at or after this time. ISO-8601
          UTC format (e.g., 2019-02-13T05:17:32.000000Z).
      - name: EndDate
        in: query
        required: false
