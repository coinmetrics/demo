    TransactionStatus:
      enum:
      - PendingApproval
      - Rejected
      - PendingTransfer
      - Completed
      - Canceled
      - TransferInitiated
      - TransferRegistered
      - TransferPendingBlockchainConfirmation
      - InProgress
      - Proposed
      type: string
      x-enumDescriptions:
        Canceled: Canceled by the user
        InProgress: General / aggregate active status
        PendingApproval: Transaction has passed validation / is completed and needs
          to be approved by an authorized party
        PendingTransfer: Transaction has been accepted and requires a transfer to
          be initiated
        Proposed: Proposed transfer or settlement. Details have been populated and
          may be updated
        Rejected: Rejected by the dealer or an external system
        TransferInitiated: Transfer has been initiated (gateway accepted the transfer
          request)
        TransferPendingBlockchainConfirmation: Transfer has been sent to blockchain
          and have txHash. Waiting for block confirmation(s)
        TransferRegistered: Transfer has been registered (request passed the validation
          and transfer request has been sent)
