    PricingRule:
      description: Matches given counterpartyID with quote parameters
      example:
        AcceptPriceLeniency: '0'
        AcceptTimeLeniency: 0s
        BidSpread: '0.0002'
        Counterparty: Really Long Name
        EnableSyntheticCounterCurrency: false
        Fee: '0.000355'
        FeeMode: QuoteCurrency
        HedgeSubAccount: 1 All Market Accounts
        MinMarketDataThrottle: 100ms
        Mode: Enabled
        OfferSpread: '0.0003'
        OrderPriceImprovementRatio: '0'
        PriceImprovementRatio: '0'
        PricesTimeout: 0s
        PricingAggregation: B2C2
        QuoteTTL: 5s
        RFQTTL: 1m
        Revision: 0
        SalesCommission: '0.000311'
        Symbol: BTC-USD
        TakeProfitInQuoteCurrency: true
      properties:
        AcceptPriceLeniency:
          description: Price leniency when deciding whether to accept a previously
            quoted price as a ratio of the customer price. This specifies the maximum
            amount of slippage that the dealer is willing to take.
          type: string
        AcceptTimeLeniency:
          description: Time leniency to apply on top of the QuoteTTL as a duration
            string
          type: string
        AllowedCrossCurrencies:
          description: Number of AllowedCrossCurrencies
          items:
            properties:
              Currency:
                description: Currency ID for amount
                type: string
            type: object
          type: array
        AllowedCrossMarkets:
          description: Number of AllowedCrossMarkets
          items:
            properties:
              Market:
                description: Market ID
                type: string
            type: object
          type: array
        BidSpread:
          description: Spread applied to bid price like 0.01
          type: string
        Counterparty:
          description: Counterparty ID
          type: string
        EnableSyntheticCounterCurrency:
          description: Enabling/disabling synthetic counter currency support
          type: boolean
        ExcludeExchangeFees:
          description: When enabled, customer fill prices exclude exchange fees from
            hedge orders
          type: boolean
        Excluded:
          description: Controls if this rule should be excluded in evaluation of effective
            pricing parameters. Empty means not ignore
          type: boolean
        Fee:
          description: Post-trade fee to take on top of the trade
          type: string
        FeeCurrency:
          description: The currency the fee will be charged in
          type: string
        FeeMode:
          $ref: '#/components/schemas/MarketFeeMode'
        HedgeSubAccount:
          description: Optional hedge subaccount sets on hedge executions
          type: string
        MinMarketDataThrottle:
          description: Minimum supported MarketData throttle
          type: string
        Mode:
          $ref: '#/components/schemas/Mode'
        OfferSpread:
          description: Spread applied to offer price like 0.01
          type: string
