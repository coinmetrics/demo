tags:
- name: Introduction
  description: 'Welcome to the Talos API. The websocket API provides access to real-time
    market data subscription, orders execution and balance allocation information.
    The REST API provides execution and historical market data.

    '
- name: API Keys
  description: 'Information about obtaining and using API keys for authentication.
    API keys can be created via the Talos UI or by contacting support.

    '
- name: Sample Code
  description: 'Sample code is available for download and includes authentication
    examples in Python, Go, NodeJS, C# and Java.

    '
- name: REST API
  description: 'REST API endpoints for execution and historical market data. REST
    requests must be authenticated by signing the request and sending the signature
    in HTTP headers.

    '
- name: Data Types
  description: 'All messages exchanged over the API are valid JSON. This API uses
    JSON strings to represent numbers (decimals) to avoid precision issues. Timestamps
    use ISO-8601 UTC format with microsecond resolution.

    '
- name: Protocol
  description: 'Protocol documentation including authentication, rate limits, pagination,
    and general message format specifications.

    '
- name: Security Master
  description: 'Talos maintains a Security Master which contains up-to-date information
    about the markets and securities supported by the system as well as which securities
    are available on what markets.

    '
- name: Market Data
  description: 'APIs for subscribing to market data. Provides depth of book as MarketDataSnapshot
    messages and last trade feed as MarketDataTrade messages.

    '
- name: Market Data REST API
  description: 'REST APIs for accessing market data. Market Data REST requests require
    only an API key to access data, requests do not need to be signed.

    '
- name: Historical Market Data
  description: 'APIs for accessing historical market data including historical last
    trades and OHLCV (Open, High, Low, Close, Volume) data.

    '
- name: Orders
  description: 'APIs for creating and managing orders. Includes lifecycle, fills,
    and cancels. Orders API roughly follows the same semantics as the FIX Protocol.

    '
- name: Post Trade
  description: 'APIs for accessing trade information after execution. Includes trade
    history and trade allocations.

    '
- name: Order Analytics
  description: 'APIs for subscribing to order analytics. Order Analytics are available
    in various resolutions based on the order duration.

    '
- name: Trade Analytics
  description: 'APIs for accessing trade analytics. Provides state of markets at the
    time the order placement decision resulting in the Trade was made.

    '
- name: Allocations
  description: 'APIs for managing trade allocations. Allocations are used to submit
    a single order and have the resulting trades split among multiple subaccounts.

    '
- name: RFQ
  description: 'APIs for requesting quotes from multiple dealers simultaneously and
    accepting them. To request a quote, send a QuoteRequest message.

    '
- name: Multileg
  description: 'APIs for executing multi-leg strategies by placing a single order
    for a synthetic instrument composed of multiple underlying legs.

    '
- name: Dealer
  description: 'APIs representing interactions with customers. Includes customer quotes,
    orders, trades, and settlement reports.

    '
- name: Dealer Integrations
  description: 'Integration points for configuring and monitoring the Dealer trading
    functionality. Includes pricing rules and execution rules.

    '
- name: Customer settlement
  description: 'APIs for dealers to track which customer trades were done on credit
    and what portion of the trade is considered as unsettled.

    '
- name: Balances
  description: 'APIs for accessing balances from exchanges and unsettled positions
    from dealers. Balances update in real-time as the platform sends orders and receives
    trades.

    '
- name: Positions
  description: 'APIs for accessing positions from exchanges/dealers and internally
    calculated position values. Positions update in real-time as the platform sends
    orders and receives trades.

    '
- name: Subaccounts
  description: 'APIs for creating and using subaccounts to filter, group, and allocate
    Orders, Trades, and Quotes independent of their target markets.

    '
- name: Rollups
  description: 'APIs for creating and using rollups to provide aggregated views for
    a set of Subaccounts. Rollup positions are computed from aggregated values of
    underlying member subaccounts.

    '
- name: SubAccount Position Limits
  description: 'APIs for managing subaccount position-based trading limits for particular
    assets. Limits can be created on both subaccount and subaccount rollups.

    '
- name: SubAccount Window Limits
  description: 'APIs for managing subaccount window-based trading limits for particular
    assets at variable window durations. Supports limits on new orders, volume, and
    active volume.

    '
- name: SubAccount Allocation Controls
  description: 'APIs for managing subaccount allocation controls.

    '
- name: Calendars
  description: 'APIs for accessing trading calendars and holidays.

    '
- name: Equity Margin Ratio Limits
  description: 'APIs for managing leverage limits across different venues by setting
    a ratio limit based on the equity and maintenance margin values reported.

    '
- name: Fees
  description: 'APIs for modifying the fees used by OMS during order routing. Fees
    are resolved in hierarchy: Per-Security Config --> Default Config --> Exchange
    Per-Security --> Exchange Default.

    '
- name: Exposures
  description: 'APIs for accessing exposure information for individual currencies
    and for counterparty as a whole (net open position). All exposures are expressed
    in home currency.

    '
- name: Transfers
  description: 'APIs for creating transfers. Transfer requests are sent using the
    NewTransfer message and are subject to a rate limit of 10 requests per second.

    '
- name: Aggregations
  description: 'APIs for managing named aggregations that specify configuration for
    a set of one or more markets. Can be used to enable/disable markets for various
    features.

    '
- name: Counterparties
  description: 'APIs for managing counterparties registered at Talos to trade with.

    '
- name: Market Accounts
  description: 'APIs for managing registered market accounts which can be used for
    balances and transfers.

    '
- name: Unified Liquidity Rules
  description: 'APIs for unifying liquidity across spot USD and stablecoin pairs,
    perpetual swaps with the same base currency across multiple exchanges, and unifying
    synthetic and native crosses.

    '
- name: Customer API
  description: 'APIs used by customers of an organization providing dealer services.
    The API is a websocket API where customers authenticate their connection through
    a configured authentication service.

    '
- name: Credentials
  description: 'APIs for programmatically managing credentials and connections.

    '
- name: Fix Connections
  description: 'APIs for programmatically managing FIX protocol connections. Allows
    creating, reading, updating, and deleting both client and customer FIX connections.

    '
- name: External HSM
  description: 'APIs for integrating with client-managed Key Management Systems (KMS)
    via a generic interface. Allows clients to maintain full control over their private
    exchange keys while enabling Talos to request cryptographic signatures securely
    at runtime.

    '
- name: User Audit
  description: 'APIs for viewing user details and related update history.

    '
- name: Notifications
  description: 'APIs for subscribing to and managing notifications.

    '
- name: Pricing Rules
  description: 'APIs for managing counterparty and global pricing rules.

    '
- name: Pricing Tiers
  description: 'APIs for managing all-in tiers, fee tiers, and symbol groups for pricing.

    '
- name: Customer Credit
  description: 'APIs for managing customer credit information and limits.

    '
- name: Customer Margins
  description: 'APIs for accessing customer margin information.

    '
- name: Funding Rate Configurations
  description: 'APIs for managing funding rate configurations.

    '
- name: Market Security Modes
  description: 'APIs for managing market security modes.

    '
- name: Asset Transactions
  description: 'APIs for managing asset transactions.

    '
- name: Max Order Size Limits
  description: 'APIs for managing maximum order size limits.

    '
- name: User Groups
  description: 'APIs for managing user groups and memberships.

    '
- name: Rate Limits
  description: 'APIs for managing message processing rate limits.

    '
- name: Customer Risk
  description: 'APIs for managing customer risk limits including net acquisition limits.

    '
- name: Baskets
  description: 'APIs for managing basket orders and instruments.

    '
- name: Instruments
  description: 'APIs for managing trading instruments.

    '
- name: Contracts
  description: 'APIs for managing contracts including Credit Support Annex (CSA).

    '
- name: Hedging
  description: 'APIs for managing hedging operations.

    '
- name: Schedules
  description: 'APIs for managing schedules.

    '
- name: Treasury
  description: 'APIs for managing treasury operations including account links and
    transactions.

    '
- name: Reconciliation
  description: 'APIs for reconciliation operations.

    '
- name: Users
  description: 'APIs for managing users.

    '
components:
  schemas:
    AggregationRequest:
      type: object
      title: AggregationRequest
      description: Request to create a new aggregation
      required:
      - Name
      - DisplayName
      - AggregationType
      properties:
        Name:
          type: string
          description: Unique name for the aggregation
        DisplayName:
          type: string
          description: Human-readable display name
        AggregationType:
          type: string
          description: Type of aggregation
          enum:
          - Customer
          - User
    ApiKey:
      type: object
      title: ApiKey
      description: API key for authentication
      properties:
        ApiKeyID:
          type: string
          description: Unique API key ID
        Name:
          type: string
          description: API key name
        Key:
          type: string
          description: API key value
        Permissions:
          type: array
          items:
            type: string
          description: List of permissions
        CreatedAt:
          type: string
          format: date-time
        ExpiresAt:
          type: string
          format: date-time
        Status:
          type: string
          description: API key status
    ApiKeyPermissions:
      type: object
      title: ApiKeyPermissions
      description: API key permissions configuration
      properties:
        Read:
          type: boolean
        Write:
          type: boolean
        Trade:
          type: boolean
        Admin:
          type: boolean
    ApiKeyPermissionsResponse:
      title: ApiKeyPermissionsResponse
      description: API response wrapper for ApiKeyPermissions
      type: object
      additionalProperties: false
      required:
      - type
      - ts
      - data
      properties:
        type:
          type: string
          description: The type of message/data returned
          example: ApiKeyPermissions
        ts:
          type: string
          format: date-time
          description: Timestamp in ISO-8601 UTC format with microsecond resolution
          example: '2019-09-18T03:04:07.560671Z'
        data:
          items:
            $ref: '#/components/schemas/ApiKeyPermissions'
          type: array
        next:
          type: string
          description: Pagination token for fetching the next page of results. Present
            when more data is available.
          example: MTAwMQ==
    ApiKeyRequest:
      type: object
      title: ApiKeyRequest
      description: Request to create an API key
      required:
      - Name
      properties:
        Name:
          type: string
        Permissions:
          type: array
          items:
            type: string
        ExpiresAt:
          type: string
          format: date-time
    ApiKeyResponse:
      title: ApiKeyResponse
      description: API response wrapper for ApiKey
      type: object
      additionalProperties: false
      required:
      - type
      - ts
      - data
      properties:
        type:
          type: string
          description: The type of message/data returned
          example: ApiKey
        ts:
          type: string
          format: date-time
          description: Timestamp in ISO-8601 UTC format with microsecond resolution
          example: '2019-09-18T03:04:07.560671Z'
        data:
          items:
            $ref: '#/components/schemas/ApiKey'
          type: array
        next:
          type: string
          description: Pagination token for fetching the next page of results. Present
            when more data is available.
          example: MTAwMQ==
    ApiResponse:
      type: object
      required:
      - type
      - ts
      - data
      properties:
        type:
          type: string
          description: The type of message/data returned
          example: Order
        ts:
          type: string
          format: date-time
          description: Timestamp in ISO-8601 UTC format with microsecond resolution
          example: '2019-09-18T03:04:07.560671Z'
        data:
          type: array
          description: Array of data items. The structure of items depends on the
            type field.
          items:
            type: object
        next:
          type: string
          description: Pagination token for fetching the next page of results. Present
            when more data is available.
          example: MTAwMQ==
    Balance:
      type: object
      title: Balance
      description: Account balance
      properties:
        Currency:
          type: string
        Market:
          type: string
        Account:
          type: string
        Amount:
          type: string
          format: decimal
        AvailableAmount:
          type: string
          format: decimal
        AvailableMargin:
          type: string
          format: decimal
        YieldingAmount:
          type: string
          format: decimal
        OutstandingBuy:
          type: string
          format: decimal
        OutstandingSell:
          type: string
          format: decimal
        LastUpdateTime:
          type: string
          format: date-time
        Status:
          type: string
        MarketAccountID:
          type: integer
        ReconStatus:
          type: object
          properties:
            Revision:
              type: integer
            TotalMismatch:
              type: string
              format: decimal
            LastMismatchTime:
              type: string
              format: date-time
            Status:
              type: string
    BalanceResetRequest:
