openapi: 3.0.3
info:
  title: Talos REST API
  version: 1.0.0
  description: Talos Platform REST API Documentation
servers:
- url: https://tal-{ORGID}.prod.talostrading.com/v1
  description: Org specific production endpoint
  variables:
    ORGID:
      description: Organization ID as specified when API key is given
      default: '1'
security:
- ApiKey: []
- ApiKey: []
  ApiKeyTs: []
  ApiKeySign: []
- cookieAuth: []
paths:
  /markets:
    get:
      summary: List markets
      description: Retrieve a list of markets
      operationId: listMarkets
      tags:
      - Security Master
      parameters:
      - name: Markets
        in: query
        required: false
        schema:
          type: string
        description: Filter by Markets
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /currencies:
    get:
      summary: List currencies
      description: Retrieve a list of all currencies
      operationId: listCurrencies
      tags:
      - Security Master
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /currencies/{currencySym}/aliases:
    get:
      summary: Get currency aliases
      description: Retrieve aliases for a specific currency
      operationId: getCurrencyAliases
      tags:
      - Security Master
      parameters:
      - name: currencySym
        in: path
        required: true
        schema:
          type: string
        description: Currency symbol
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Resource does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /markets/currencies:
    get:
      summary: List market currencies
      description: Retrieve currencies available on specific markets
      operationId: listMarketCurrencies
      tags:
      - Security Master
      parameters:
      - name: Markets
        in: query
        required: false
        schema:
          type: string
        description: Filter by Markets
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketCurrencyResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /securities:
    get:
      summary: List securities
      description: Retrieve a list of all securities
      operationId: listSecurities
      tags:
      - Security Master
      parameters:
      - name: Symbol
        in: query
        required: false
        schema:
          type: string
        description: Filter by symbol
      - name: BaseCurrency
        in: query
        required: false
        schema:
          type: string
        description: Filter by base currency
      - name: QuoteCurrency
        in: query
        required: false
        schema:
          type: string
        description: Filter by quote currency
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /markets/securities:
    get:
      summary: List market securities
      description: Retrieve securities available on specific markets
      operationId: listMarketSecurities
      tags:
      - Security Master
      parameters:
      - name: Markets
        in: query
        required: false
        schema:
          type: string
        description: Filter by Markets
      - name: Symbol
        in: query
        required: false
        schema:
          type: string
        description: Filter by symbol
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketSecurityResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /markets/securities/statuses:
    get:
      summary: List market security statuses
      description: Retrieve trading status for market securities
      operationId: listMarketSecurityStatuses
      tags:
      - Security Master
      parameters:
      - name: Markets
        in: query
        required: false
        schema:
          type: string
        description: Filter by Markets
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketSecurityStatusResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /market-data/snapshot/{symbol}:
    get:
      summary: Get market data snapshot
      description: Retrieve a market data snapshot for a symbol. One of Depth, SizeBuckets,
        or AmountBuckets must be specified.
      operationId: getMarketDataSnapshot
      tags:
      - Market Data
      parameters:
      - name: symbol
        in: path
        required: true
        schema:
          type: string
        description: Trading symbol (e.g., BTC-USD)
      - name: Depth
        in: query
        required: false
        schema:
          type: integer
        description: Number of price levels to return. One of Depth, SizeBuckets,
          or AmountBuckets must be specified.
      - name: SizeBuckets
        in: query
        required: false
        schema:
          type: string
        description: Size buckets for aggregation. One of Depth, SizeBuckets, or AmountBuckets
          must be specified.
      - name: AmountBuckets
        in: query
        required: false
        schema:
          type: string
        description: Amount buckets for aggregation. One of Depth, SizeBuckets, or
          AmountBuckets must be specified.
      - name: Markets
        in: query
        required: false
        schema:
          type: string
        description: Comma-separated list of markets to include
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketDataSnapshotResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Resource does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /customer/market-data/snapshot/{symbol}:
    get:
      summary: Get customer market data snapshot
      description: Retrieve a market data snapshot for a customer symbol. One of Depth,
        SizeBuckets, or AmountBuckets must be specified.
      operationId: getCustomerMarketDataSnapshot
      tags:
      - Customer API
      parameters:
      - name: symbol
        in: path
        required: true
        schema:
          type: string
        description: Trading symbol (e.g., BTC-USD)
      - name: Counterparty
        in: query
        required: true
        schema:
          type: string
        description: Counterparty name for customer market data
      - name: Depth
        in: query
        required: false
        schema:
          type: integer
        description: Number of price levels to return. One of Depth, SizeBuckets,
          or AmountBuckets must be specified.
      - name: SizeBuckets
        in: query
        required: false
        schema:
          type: string
        description: Size buckets for aggregation. One of Depth, SizeBuckets, or AmountBuckets
          must be specified.
      - name: AmountBuckets
        in: query
        required: false
        schema:
          type: string
        description: Amount buckets for aggregation. One of Depth, SizeBuckets, or
          AmountBuckets must be specified.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerMarketDataSnapshotResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Resource does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /symbols/{symbol}/ohlcv/{resolution}:
    get:
      servers:
      - url: https://talostrading.com/v1
        description: Production endpoint
      summary: Get OHLCV data for symbol
      description: Retrieve OHLCV (Open, High, Low, Close, Volume) data for a symbol
      operationId: getSymbolOHLCV
      tags:
      - Market Data REST API
      parameters:
      - name: symbol
        in: path
        required: true
        schema:
          type: string
      - name: resolution
        in: path
        required: true
        schema:
          type: string
          enum:
          - 1m
          - 5m
          - 15m
          - 1h
          - 4h
          - 1d
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OHLCVResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Resource does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /symbols/{symbol}/markets/{market}/ohlcv/{resolution}:
    get:
      servers:
      - url: https://talostrading.com/v1
        description: Production endpoint
      summary: Get OHLCV data for symbol on market
      description: Retrieve OHLCV data for a symbol on a specific market
      operationId: getSymbolMarketOHLCV
      tags:
      - Market Data REST API
      parameters:
      - name: symbol
        in: path
        required: true
        schema:
          type: string
      - name: market
        in: path
        required: true
        schema:
          type: string
      - name: resolution
        in: path
        required: true
        schema:
          type: string
          enum:
          - 1m
          - 5m
          - 15m
          - 1h
          - 4h
          - 1d
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OHLCVResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Resource does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /orders:
    get:
      summary: List orders
      description: 'Retrieve a list of orders. At least one filter (date range or
        specific filter) is required.

        '
      operationId: listOrders
      tags:
      - Orders
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 1000
        description: Number of records to return. Defaults to 1000.
      - name: after
        in: query
        required: false
        schema:
          type: string
        description: Pagination token from the `next` field of a previous response.
      - name: startDate
        in: query
        required: false
        schema:
          type: string
          format: date-time
        description: Start date filter in ISO-8601 format (e.g., 2024-01-01T00:00:00Z).
      - name: endDate
        in: query
        required: false
        schema:
          type: string
          format: date-time
        description: End date filter in ISO-8601 format (e.g., 2024-01-01T23:59:59Z).
      - name: OrderID
        in: query
        required: false
        schema:
          type: string
        description: Filter by OrderID.
      - name: RFQID
        in: query
        required: false
        schema:
          type: string
        description: Filter by RFQ ID.
      - name: ClOrdID
        in: query
        required: false
        schema:
          type: string
        description: Filter by Client Order ID (matches ClOrdID or OrigClOrdID).
      - name: Group
        in: query
        required: false
        schema:
          type: string
        description: Filter by order group.
      - name: SubAccounts
        in: query
        required: false
        schema:
          type: string
        description: Comma-separated list of subaccount names to filter by.
      - name: Statuses
        in: query
        required: false
        schema:
          type: string
        description: Comma-separated list of order statuses (e.g., "New,PartiallyFilled,Filled").
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create order
      description: 'Submit a new order. The response includes the execution report
        for the order.

        Use `timeout` and `wait-for-status` query parameters to control synchronous
        behavior.

        '
      operationId: createOrder
      tags:
      - Orders
      parameters:
      - name: timeout
        in: query
        required: false
        schema:
          type: string
        description: Request timeout duration (e.g., "30s", "1m"). Defaults to org
          configuration.
      - name: wait-for-status
        in: query
        required: false
        schema:
          type: string
          enum:
          - Pending
          - Acknowledged
          - Terminal
        description: Wait for order to reach this status before returning.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewOrderSingle'
      responses:
        '200':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '504':
          description: Gateway Timeout - Operation timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Cancel order by query
      description: 'Cancel an order by OrderID or ClOrdID. At least one identifier
        is required.

        '
      operationId: cancelOrderByQuery
      tags:
      - Orders
      parameters:
      - name: OrderID
        in: query
        required: false
        schema:
          type: string
        description: The OrderID of the order to cancel.
      - name: ClOrdID
        in: query
        required: false
        schema:
          type: string
        description: The Client Order ID of the order to cancel.
      - name: timeout
        in: query
        required: false
        schema:
          type: string
        description: Request timeout duration (e.g., "30s", "1m").
      - name: wait-for-status
        in: query
        required: false
        schema:
          type: string
          enum:
          - Pending
          - Acknowledged
          - Terminal
        description: Wait for order to reach this status before returning.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /orders/{orderID}:
    get:
      summary: Get order
      description: Retrieve a specific order by OrderID.
      operationId: getOrder
      tags:
      - Orders
      parameters:
      - name: orderID
        in: path
        required: true
        schema:
          type: string
        description: The unique OrderID.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: Not Found - Resource does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update order
      description: 'Modify an existing order. Supports cancel/replace operations.

        '
      operationId: updateOrder
      tags:
      - Orders
      parameters:
      - name: orderID
        in: path
        required: true
        schema:
          type: string
        description: The unique OrderID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TradeUpdateRequest'
      responses:
        '200':
          description: Order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad Request - Invalid input or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Resource does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Cancel order
      description: Cancel an order by OrderID.
      operationId: cancelOrder
      tags:
      - Orders
      parameters:
      - name: orderID
        in: path
        required: true
        schema:
          type: string
        description: The unique OrderID.
      - name: timeout
        in: query
        required: false
        schema:
          type: string
        description: Request timeout duration (e.g., "30s", "1m").
      - name: wait-for-status
        in: query
        required: false
        schema:
          type: string
          enum:
          - Pending
          - Acknowledged
          - Terminal
        description: Wait for order to reach this status before returning.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
