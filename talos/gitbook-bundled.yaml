          description: ID of the borrower participant for this relationship. If zero,
            applies to all borrowers this lender faces.
          type: string
        BorrowerTransferAutomationStatus:
          $ref: '#/components/schemas/TransferAutomationStatus'
        CollateralCurrencies:
          description: The settings for currencies accepted as collateral by this
